<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .admin-stat-card {
      background: var(--gris-900);
      border: 1px solid rgba(243,237,225,0.08);
      border-radius: var(--radius);
      padding: var(--sp-3);
      text-align: center;
    }
    .admin-stat-card__num {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--lima-voltio);
      line-height: 1;
    }
    .admin-stat-card__label {
      font-size: 0.78rem;
      color: var(--gris-500);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.3rem;
    }
    .admin-stat-card--warning .admin-stat-card__num {
      color: var(--warning);
    }
    .admin-stat-card--success .admin-stat-card__num {
      color: var(--success);
    }
    .admin-table-wrap {
      overflow-x: auto;
      margin-top: var(--sp-3);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .admin-table th {
      text-align: left;
      padding: var(--sp-1) var(--sp-2);
      color: var(--gris-500);
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(243,237,225,0.08);
    }
    .admin-table td {
      padding: var(--sp-2);
      border-bottom: 1px solid rgba(243,237,225,0.04);
      color: var(--gris-300);
      vertical-align: middle;
    }
    .admin-table tr:hover td {
      background: rgba(198,255,61,0.03);
    }
    .admin-table .user-cell {
      display: flex;
      flex-direction: column;
    }
    .admin-table .user-cell strong {
      color: var(--crema-andina);
      font-size: 0.9rem;
    }
    .admin-table .user-cell span {
      font-size: 0.78rem;
      color: var(--gris-500);
    }
    .admin-actions {
      display: flex;
      gap: var(--sp-1);
    }
    .admin-btn {
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 700;
      transition: opacity var(--t-fast);
    }
    .admin-btn:hover {
      opacity: 0.8;
    }
    .admin-btn--approve {
      background: rgba(46,125,50,0.15);
      color: var(--success);
      border: 1px solid rgba(46,125,50,0.3);
    }
    .admin-btn--reject {
      background: rgba(211,47,47,0.15);
      color: var(--error);
      border: 1px solid rgba(211,47,47,0.3);
    }
    .admin-btn--wa {
      background: rgba(37,211,102,0.15);
      color: #25D366;
      border: 1px solid rgba(37,211,102,0.3);
    }
    .admin-btn--wa:hover {
      background: rgba(37,211,102,0.25);
    }
    .admin-notif-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      background: rgba(46,125,50,0.12);
      border: 1px solid rgba(46,125,50,0.25);
      border-radius: var(--radius-sm);
      padding: var(--sp-2) var(--sp-3);
      margin-top: var(--sp-2);
      flex-wrap: wrap;
    }
    .admin-notif-bar strong {
      color: var(--crema-andina);
      flex: 1;
      min-width: 150px;
    }
    .admin-empty {
      text-align: center;
      padding: var(--sp-5);
      color: var(--gris-500);
    }
    .admin-section-title {
      font-family: var(--font-display);
      font-size: var(--fs-h3);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: var(--sp-4);
      margin-bottom: var(--sp-2);
    }
    .admin-section-title i {
      color: var(--lima-voltio);
      font-size: 1.3rem;
    }
    .admin-deny {
      text-align: center;
      padding: var(--sp-6);
    }
    .admin-deny i {
      font-size: 3rem;
      color: var(--error);
      margin-bottom: var(--sp-2);
    }
    .admin-deny h2 {
      font-family: var(--font-display);
      font-size: var(--fs-h2);
      letter-spacing: 0.5px;
    }
    .admin-toast {
      position: fixed;
      bottom: var(--sp-3);
      right: var(--sp-3);
      background: var(--success);
      color: var(--blanco);
      padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.85rem;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }
    .admin-search {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-3);
      background: var(--negro);
      border: 1px solid rgba(243,237,225,0.1);
      border-radius: var(--radius-sm);
      padding: 0.6rem var(--sp-2);
      transition: border-color var(--t-fast);
    }
    .admin-search:focus-within {
      border-color: var(--lima-voltio);
    }
    .admin-search i {
      color: var(--gris-500);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .admin-search input {
      background: none;
      border: none;
      outline: none;
      color: var(--crema-andina);
      font-size: 0.9rem;
      width: 100%;
    }
    .admin-search input::placeholder {
      color: var(--gris-500);
    }
    .admin-search-clear {
      background: none;
      border: none;
      color: var(--gris-500);
      font-size: 1rem;
      padding: 0.2rem;
      display: none;
    }
    .admin-search-clear.visible {
      display: block;
    }
    .admin-search-clear:hover {
      color: var(--crema-andina);
    }
    .admin-filters {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
      align-items: center;
    }
    .admin-date-input {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      background: var(--negro);
      border: 1px solid rgba(243,237,225,0.1);
      border-radius: var(--radius-sm);
      padding: 0.5rem var(--sp-2);
      transition: border-color var(--t-fast);
    }
    .admin-date-input:focus-within {
      border-color: var(--lima-voltio);
    }
    .admin-date-input i {
      color: var(--gris-500);
      font-size: 1rem;
      flex-shrink: 0;
    }
    .admin-date-input input {
      background: none;
      border: none;
      outline: none;
      color: var(--crema-andina);
      font-size: 0.8rem;
      width: 130px;
      color-scheme: dark;
    }
    .admin-date-input input::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    .admin-weekly {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }
    .admin-weekly__card {
      background: var(--gris-900);
      border: 1px solid rgba(243,237,225,0.06);
      border-radius: var(--radius);
      padding: var(--sp-3);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .admin-weekly__icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border-radius: 12px;
      font-size: 1.3rem;
    }
    .admin-weekly__icon--users {
      background: rgba(198,255,61,0.1);
      color: var(--lima-voltio);
    }
    .admin-weekly__icon--payments {
      background: rgba(46,125,50,0.12);
      color: var(--success);
    }
    .admin-weekly__icon--income {
      background: rgba(255,199,44,0.12);
      color: var(--amarillo-oro);
    }
    .admin-weekly__icon--total {
      background: rgba(37,211,102,0.1);
      color: #25D366;
    }
    .admin-weekly__info {
      display: flex;
      flex-direction: column;
    }
    .admin-weekly__num {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--crema-andina);
      line-height: 1;
    }
    .admin-weekly__label {
      font-size: 0.68rem;
      color: var(--gris-500);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
    .admin-weekly__label small {
      color: var(--gris-500);
      opacity: 0.7;
    }
    .admin-chart {
      background: var(--gris-900);
      border: 1px solid rgba(243,237,225,0.06);
      border-radius: var(--radius);
      padding: var(--sp-4);
      margin-bottom: var(--sp-3);
    }
    .admin-chart__title {
      font-family: var(--font-display);
      font-size: var(--fs-h3);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: var(--sp-1);
    }
    .admin-chart__title i {
      color: var(--lima-voltio);
      font-size: 1.3rem;
    }
    .admin-chart__desc {
      color: var(--gris-500);
      font-size: 0.8rem;
      margin-bottom: var(--sp-3);
    }
    .admin-chart__bars {
      display: flex;
      align-items: flex-end;
      gap: var(--sp-2);
      height: 200px;
      padding-bottom: 28px;
      position: relative;
      overflow-x: auto;
    }
    .admin-chart__col {
      flex: 1;
      min-width: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      position: relative;
    }
    .admin-chart__bar {
      width: 100%;
      max-width: 60px;
      background: linear-gradient(to top, var(--lima-voltio), rgba(198,255,61,0.4));
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      min-height: 4px;
      transition: height 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
      position: relative;
      cursor: pointer;
    }
    .admin-chart__bar:hover {
      opacity: 0.8;
    }
    .admin-chart__bar-value {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--crema-andina);
      white-space: nowrap;
    }
    .admin-chart__col-label {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--gris-500);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .admin-chart__empty {
      text-align: center;
      width: 100%;
      padding: var(--sp-4);
      color: var(--gris-500);
    }
    .admin-status-filters {
      display: flex;
      gap: var(--sp-1);
      margin-bottom: var(--sp-3);
      flex-wrap: wrap;
    }
    .admin-status-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(243,237,225,0.06);
      color: var(--gris-300);
      border: 1px solid rgba(243,237,225,0.08);
      transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
    }
    .admin-status-btn:hover {
      background: rgba(198,255,61,0.08);
      color: var(--lima-voltio);
    }
    .admin-status-btn--active {
      background: rgba(198,255,61,0.12);
      color: var(--lima-voltio);
      border-color: rgba(198,255,61,0.3);
    }
    .admin-export-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 700;
      background: rgba(0,128,0,0.12);
      color: #00b894;
      border: 1px solid rgba(0,128,0,0.25);
      transition: background var(--t-fast), opacity var(--t-fast);
      white-space: nowrap;
    }
    .admin-export-btn:hover {
      background: rgba(0,128,0,0.2);
    }
    .admin-realtime-alert {
      position: fixed;
      top: calc(var(--header-h) + var(--sp-2));
      right: var(--sp-3);
      max-width: 420px;
      background: var(--gris-900);
      border: 2px solid rgba(198,255,61,0.35);
      border-radius: var(--radius);
      padding: var(--sp-3);
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideInRight 0.35s cubic-bezier(0.22,0.61,0.36,1);
    }
    .admin-realtime-alert__header {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: 0.8rem;
      color: var(--lima-voltio);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--sp-1);
    }
    .admin-realtime-alert__body {
      color: var(--crema-andina);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .admin-realtime-alert__body strong {
      color: var(--lima-voltio);
    }
    .admin-realtime-alert__actions {
      display: flex;
      gap: var(--sp-1);
      margin-top: var(--sp-2);
    }
    .admin-realtime-alert__btn {
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity var(--t-fast);
    }
    .admin-realtime-alert__btn:hover {
      opacity: 0.8;
    }
    .admin-realtime-alert__btn--primary {
      background: var(--lima-voltio);
      color: var(--negro);
    }
    .admin-realtime-alert__btn--secondary {
      background: rgba(243,237,225,0.08);
      color: var(--gris-300);
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>

  <script>
(function () {
  'use strict';

  var SUPABASE_URL = 'https://cgqerygskfuctvfwgpxv.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_I8iqpE0e6IbDwyxVwpaQJA_odh4PT3g';
  var ADMIN_EMAILS = ['iamisma326@gmail.com', 'diego.alegres@istpargentina.edu.pe'];

  var sbClient = null;
  var _searchTerm = '';
  var _filterStatus = 'todos';
  var _filterDateFrom = '';
  var _filterDateTo = '';
  var _allPayments = [];
  var _allActiveCount = 0;
  var _allIngresosMes = 0;
  var _weeklyUsers = 0;
  var _weeklyPayments = 0;
  var _weeklyIncome = 0;
  var _totalUsers = 0;

  function getClient() {
    if (sbClient) return sbClient;
    if (typeof supabase !== 'undefined') {
      sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          autoRefreshToken: true,
          persistSession: true,
          detectSessionInUrl: true,
        },
      });
    }
    return sbClient;
  }

  async function getSession() {
    var sb = getClient();
    if (!sb) return null;
    var res = await sb.auth.getSession();
    if (res.error || !res.data.session) return null;
    return res.data.session;
  }

  async function logout() {
    var sb = getClient();
    if (!sb) return;
    await sb.auth.signOut();
  }

  function showToast(msg, isError) {
    var existing = document.querySelector('.admin-toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.className = 'admin-toast';
    if (isError) toast.style.background = 'var(--error)';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function () { toast.remove(); }, 3000);
  }

  // ---------- Inicialización ----------
  document.addEventListener('DOMContentLoaded', async function () {
    try {
      var yearEl = document.getElementById('year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      var session = await getSession();
      if (!session) {
        window.location.href = 'login.html?redirect=admin.html';
        return;
      }

      if (!ADMIN_EMAILS.includes(session.user.email)) {
        document.getElementById('app').innerHTML =
          '<section class="section" style="padding-top: calc(var(--header-h) + var(--sp-5));">' +
            '<div class="container">' +
              '<div class="admin-deny">' +
                '<i class="ph ph-shield-slash"></i>' +
                '<h2>Acceso denegado</h2>' +
                '<p class="lead" style="margin-top:var(--sp-1);">Solo los administradores pueden acceder a este panel.</p>' +
                '<a href="index.html" class="btn btn--primary" style="margin-top:var(--sp-3);">Volver al inicio</a>' +
              '</div>' +
            '</div>' +
          '</section>';
        return;
      }

      // Cargar admin dashboard (setupRealtime se llama al final)
      await loadAdminDashboard();

      // Logout link
      var navLinks = document.getElementById('navLinks');
      if (navLinks) {
        var logoutBtn = document.createElement('button');
        logoutBtn.className = 'nav__dropdown-link nav__dropdown-link--logout';
        logoutBtn.style.display = 'inline-flex';
        logoutBtn.innerHTML = '<i class="ph ph-sign-out"></i> Cerrar Sesión';
        logoutBtn.addEventListener('click', async function () {
          await logout();
          window.location.href = 'index.html';
        });
        var cta = navLinks.querySelector('.nav__cta--shine');
        if (cta) navLinks.insertBefore(logoutBtn, cta);
        else navLinks.appendChild(logoutBtn);
      }

    } catch (e) {
      console.error('Error en admin:', e);
      document.getElementById('app').innerHTML = '<p class="lead" style="text-align:center;padding:4rem;color:var(--error);">Error al cargar el panel.</p>';
    }
  });

  // ---------- Dashboard ----------
  async function loadAdminDashboard() {
    var sb = getClient();
    if (!sb) return;

    // Obtener todos los pagos con información del usuario y membresía
    var { data: allPayments, error: payError } = await sb
      .from('payments')
      .select('*, memberships(name), profiles!user_id(email, full_name)')
      .order('created_at', { ascending: false });

    if (payError) {
      console.error('Error fetching payments:', payError);
      document.getElementById('app').innerHTML = '<p class="lead" style="text-align:center;padding:4rem;color:var(--error);">Error al cargar los pagos.</p>';
      return;
    }

    // Obtener membresías activas
    var { data: activeMemberships, error: memError } = await sb
      .from('user_memberships')
      .select('*')
      .eq('active', true)
      .gte('end_date', new Date().toISOString());

    // Calcular estadísticas
    _allPayments = allPayments || [];
    var pendingTotal = _allPayments.filter(function (p) { return p.status === 'pending'; });
    var completedTotal = _allPayments.filter(function (p) { return p.status === 'completed'; });
    _allActiveCount = activeMemberships ? activeMemberships.length : 0;
    _allIngresosMes = 0;
    var startOfMonth = new Date();
    startOfMonth.setDate(1);
    startOfMonth.setHours(0, 0, 0, 0);
    completedTotal.forEach(function (p) {
      var d = new Date(p.created_at);
      if (d >= startOfMonth) {
        _allIngresosMes += parseFloat(p.amount) || 0;
      }
    });

    // Calcular stats semanales (lunes de esta semana)
    var weekStart = new Date();
    var diffDays = weekStart.getDay() === 0 ? 6 : weekStart.getDay() - 1;
    weekStart.setDate(weekStart.getDate() - diffDays);
    weekStart.setHours(0, 0, 0, 0);

    // Contar usuarios de la semana
    var { count: weekUsersCount } = await sb
      .from('profiles')
      .select('id', { count: 'exact', head: true })
      .gte('created_at', weekStart.toISOString());
    _weeklyUsers = weekUsersCount || 0;

    // Contador total de usuarios
    var { count: totalUsersCount } = await sb
      .from('profiles')
      .select('id', { count: 'exact', head: true });
    _totalUsers = totalUsersCount || 0;

    // Pagos e ingresos de la semana
    _weeklyPayments = 0;
    _weeklyIncome = 0;
    _allPayments.forEach(function (p) {
      var d = new Date(p.created_at);
      if (d >= weekStart) {
        _weeklyPayments++;
        if (p.status === 'completed') {
          _weeklyIncome += parseFloat(p.amount) || 0;
        }
      }
    });

    renderDashboard();

    // (Re)activar notificaciones en tiempo real cada vez que se carga el dashboard
    setupRealtime();
  }

    var term = _searchTerm.toLowerCase();

      // Filtro por fecha desde

        var d = new Date(p.created_at);
        var from = new Date(_filterDateFrom);
        from.setHours(0, 0, 0, 0);
        if (d < from) return false;
      }

      // Filtro por fecha hasta
      if (_filterDateTo) {
        var d2 = new Date(p.created_at);
        var to = new Date(_filterDateTo);
        to.setHours(23, 59, 59, 999);
        if (d2 > to) return false;
      }

      // Filtro por texto
      if (!_searchTerm) return true;
      var profile = p.profiles || {};
      var name = (profile.full_name || '').toLowerCase();
      var email = (profile.email || '').toLowerCase();
      var plan = p.memberships ? (p.memberships.name || '').toLowerCase() : '';
      return name.indexOf(term) !== -1 || email.indexOf(term) !== -1 || plan.indexOf(term) !== -1;

  function renderIncomeChart() {
    // Calcular ingresos por mes (solo completed)
    var completed = _allPayments.filter(function (p) { return p.status === 'completed'; });
    if (completed.length === 0) {
      return '<div class="admin-chart">' +
        '<div class="admin-chart__title"><i class="ph ph-trend-up"></i> Ingresos Mensuales</div>' +
        '<div class="admin-chart__empty">Aún no hay pagos completados para mostrar.</div>' +
      '</div>';
    }

    // Generar últimos 6 meses
    var months = [];
    var now = new Date();
    for (var m = 5; m >= 0; m--) {
      var d = new Date(now.getFullYear(), now.getMonth() - m, 1);
      months.push({
        key: d.getFullYear() + '-' + (d.getMonth() + 1),
        label: d.toLocaleDateString('es-PE', { month: 'short' }).replace(/\./g, '').toUpperCase() + ' ' + d.getFullYear().toString().slice(-2),
        total: 0
      });
    }

    // Sumar ingresos de cada mes
    completed.forEach(function (p) {
      var date = new Date(p.created_at);
      var key = date.getFullYear() + '-' + (date.getMonth() + 1);
      for (var i = 0; i < months.length; i++) {
        if (months[i].key === key) {
          months[i].total += parseFloat(p.amount) || 0;
          break;
        }
      }
    });

    // Encontrar el valor máximo
    var maxVal = 0;
    for (var i = 0; i < months.length; i++) {
      if (months[i].total > maxVal) maxVal = months[i].total;
    }
    if (maxVal === 0) maxVal = 1;

    // Generar HTML de barras
    var barsHtml = '';
    for (var i = 0; i < months.length; i++) {
      var month = months[i];
      var heightPct = maxVal > 0 ? (month.total / maxVal) * 100 : 0;
      if (heightPct < 2) heightPct = 0; // ocultar barras de 0
      var valueHtml = month.total > 0
        ? '<span class="admin-chart__bar-value">S/ ' + month.total.toFixed(0) + '</span>'
        : '';
      var barStyle = heightPct > 0 ? 'height:' + heightPct + '%' : 'height:2px;background:rgba(243,237,225,0.08);';
      barsHtml +=
        '<div class="admin-chart__col">' +
          '<div class="admin-chart__bar" style="' + barStyle + '">' +
            valueHtml +
          '</div>' +
          '<span class="admin-chart__col-label">' + month.label + '</span>' +
        '</div>';
    }

    return '<div class="admin-chart">' +
      '<div class="admin-chart__title"><i class="ph ph-trend-up"></i> Ingresos Mensuales</div>' +
      '<div class="admin-chart__desc">Últimos 6 meses · Solo pagos completados</div>' +
      '<div class="admin-chart__bars">' + barsHtml + '</div>' +
    '</div>';
  }

  // ---------- Realtime: notificaciones en vivo ----------
  var _realtimeChannel = null;

  function setupRealtime() {
    var sb = getClient();
    if (!sb) return;

    // Limpiar canal anterior (evita duplicados al recargar dashboard)
    if (_realtimeChannel) {
      sb.removeChannel(_realtimeChannel);
    }

    _realtimeChannel = sb
      .channel('admin-payments')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'payments' },
        function (payload) {
          var newPayment = payload.new;
          // Solo notificar de pagos pendientes
          if (newPayment.status !== 'pending') return;

          // Obtener datos del perfil y membresía
          var profilePromise = sb
            .from('profiles')
            .select('full_name, email')
            .eq('id', newPayment.user_id)
            .single();

          var planPromise = sb
            .from('memberships')
            .select('name')
            .eq('id', newPayment.membership_id)
            .single();

          Promise.all([profilePromise, planPromise])
            .then(function (results) {
              var profile = results[0].data || {};
              var plan = results[1].data || {};
              var name = profile.full_name || profile.email || 'Usuario';
              var planName = plan.name || 'Membresía';
              showRealtimeAlert(name, planName, newPayment);
            })
            .catch(function () {
              showRealtimeAlert('Usuario', 'Membresía', newPayment);
            });
        }
      )
      .subscribe();
  }

  // ---------- Sonido de notificación ----------
  var _audioCtx = null;

  async function playNotificationSound() {
    try {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Reanudar si está suspendido (navegadores requieren interacción)
      if (_audioCtx.state === 'suspended') {
        await _audioCtx.resume();
      }

      var now = _audioCtx.currentTime;
      var gainNode = _audioCtx.createGain();
      gainNode.connect(_audioCtx.destination);
      gainNode.gain.setValueAtTime(0.3, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

      // Primer tono (do agudo)
      var osc1 = _audioCtx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(523.25, now); // C5
      osc1.connect(gainNode);
      osc1.start(now);
      osc1.stop(now + 0.15);

      // Segundo tono (mi)
      var gain2 = _audioCtx.createGain();
      gain2.connect(_audioCtx.destination);
      gain2.gain.setValueAtTime(0.25, now + 0.12);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.7);

      var osc2 = _audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(659.25, now + 0.12); // E5
      osc2.connect(gain2);
      osc2.start(now + 0.12);
      osc2.stop(now + 0.35);
    } catch (e) {
      // Silencioso: si falla el audio, no interrumpir la notificación
      console.warn('Audio no disponible:', e.message);
    }
  }

  function showRealtimeAlert(userName, planName, payment) {
    // Reproducir sonido
    playNotificationSound();

    // Remover alertas anteriores
    var oldAlerts = document.querySelectorAll('.admin-realtime-alert');
    for (var i = 0; i < oldAlerts.length; i++) oldAlerts[i].remove();

    var monto = payment.amount || '—';

    var banner = document.createElement('div');
    banner.className = 'admin-realtime-alert';
    banner.innerHTML =
      '<div class="admin-realtime-alert__header">' +
        '<i class="ph ph-bell-ringing"></i> Nuevo pago recibido' +
      '</div>' +
      '<div class="admin-realtime-alert__body">' +
        '<strong>' + userName + '</strong> acaba de pagar <strong>S/ ' + monto + '</strong> por ' + planName + '.' +
      '</div>' +
      '<div class="admin-realtime-alert__actions">' +
        '<button class="admin-realtime-alert__btn admin-realtime-alert__btn--primary" id="alertReload">🔄 Ver pendientes</button>' +
        '<button class="admin-realtime-alert__btn admin-realtime-alert__btn--secondary" id="alertDismiss">✕ Ignorar</button>' +
      '</div>';

    document.body.appendChild(banner);

    // Botón de recargar
    document.getElementById('alertReload').addEventListener('click', function () {
      banner.remove();
      loadAdminDashboard();
    });

    // Botón de ignorar
    document.getElementById('alertDismiss').addEventListener('click', function () {
      banner.remove();
    });

    // Auto-desaparecer después de 15 segundos
    setTimeout(function () {
      if (banner.parentNode) banner.remove();
    }, 15000);
  }

  // ---------- Exportar a XLSX ----------
  function exportToXLSX() {
    // Usar los datos filtrados (lo que ve el admin en pantalla)
    var exportData = filterPayments(_allPayments);
    if (!exportData || exportData.length === 0) {
      showToast('No hay datos para exportar con los filtros actuales', true);
      return;
    }

    // Preparar datos
    var data = [['Usuario','Email','Plan','Monto','Fecha','Estado']];
    for (var i = 0; i < exportData.length; i++) {
      var p = exportData[i];
      var profile = p.profiles || {};
      data.push([
        profile.full_name || '—',
        profile.email || '—',
        p.memberships ? p.memberships.name : '—',
        parseFloat(p.amount) || 0,
        new Date(p.created_at).toLocaleDateString('es-PE', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        }),
        (p.status === 'completed' ? 'Completado' : p.status === 'pending' ? 'Pendiente' : p.status === 'failed' ? 'Rechazado' : p.status)
      ]);
    }

    // Crear workbook
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet(data);

    // Ajustar ancho de columnas
    ws['!cols'] = [
      { wch: 25 }, // Usuario
      { wch: 30 }, // Email
      { wch: 15 }, // Plan
      { wch: 10 }, // Monto
      { wch: 20 }, // Fecha
      { wch: 15 }  // Estado
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'Pagos');

    // Generar y descargar
    var now = new Date();
    var dateStr = now.toISOString().slice(0, 10);
    XLSX.writeFile(wb, 'poderjota_pagos_' + dateStr + '.xlsx');

    showToast('✅ Archivo XLSX descargado');
  }

    }
    if (e.target.id === 'adminSearchClear') {
      _searchTerm = '';
      renderDashboard();
      var inp = document.getElementById('adminSearchInput');
      if (inp) inp.focus();
    }
    var statusBtn = e.target.closest('.admin-status-btn');
    if (statusBtn) {
      _filterStatus = statusBtn.getAttribute('data-status') || 'todos';
      renderDashboard();
    }
  });

  // ---------- Delegación de eventos para botones de aprobar/rechazar ----------
  document.addEventListener('click', async function (e) {
    var target = e.target.closest('.btn-approve, .btn-reject');
    if (!target) return;

    var paymentId = target.getAttribute('data-id');
    var isApprove = target.classList.contains('btn-approve');
    var sb = getClient();
    if (!sb) return;

    if (isApprove) {
      // Obtener datos del pago
      var { data: payment, error: fetchErr } = await sb
        .from('payments')
        .select('*, memberships(*)')
        .eq('id', paymentId)
        .single();

      if (fetchErr || !payment) {
        showToast('Error al obtener datos del pago', true);
        return;
      }

      // Calcular fecha de fin
      var durationDays = (payment.memberships && payment.memberships.duration_days) || 30;
      var endDate = new Date();
      endDate.setDate(endDate.getDate() + durationDays);

      // Insertar membresía
      var { error: memErr } = await sb
        .from('user_memberships')
        .insert({
          user_id: payment.user_id,
          membership_id: payment.membership_id,
          start_date: new Date().toISOString(),
          end_date: endDate.toISOString(),
          active: true
        });

      if (memErr) {
        console.error('Error creating membership:', memErr);
        showToast('Error al crear membresía', true);
        return;
      }

      // Actualizar pago
      var { error: updErr } = await sb
        .from('payments')
        .update({ status: 'completed', updated_at: new Date().toISOString() })
        .eq('id', paymentId);

      if (updErr) {
        console.error('Error updating payment:', updErr);
        showToast('Error al actualizar pago', true);
        return;
      }

      // Mostrar notificación flotante persistente con botón WhatsApp
      var userName = (payment.profiles && payment.profiles.full_name) || 'Usuario';
      var planName = (payment.memberships && payment.memberships.name) || 'Membresía';
      var waMsg = encodeURIComponent(
        '¡Hola ' + userName + '! ✅ Tu membresía ' + planName + ' del Campus Poder Jota ha sido ACTIVADA. Ya puedes acceder a todos los cursos en https://poder-jota.vercel.app/campus.html. Inicia sesión y empieza a entrenar 💪🔥'
      );
      var waUrl = 'https://wa.me/51922375598?text=' + waMsg;

      var notif = document.createElement('div');
      notif.style.cssText = 'position:fixed;bottom:var(--sp-3);right:var(--sp-3);left:var(--sp-3);max-width:520px;margin:0 auto;background:var(--gris-900);border:2px solid rgba(46,125,50,0.4);border-radius:var(--radius);padding:var(--sp-2) var(--sp-3);z-index:1000;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;animation:slideUp 0.3s ease;';
      notif.innerHTML =
        '<span style="font-size:0.9rem;color:var(--crema-andina);flex:1;min-width:150px;">' +
          '<strong>✅ Activado:</strong> ' + userName + ' (' + planName + ')' +
        '</span>' +
        '<a href="' + waUrl + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;border-radius:var(--radius-sm);font-size:0.78rem;font-weight:700;background:rgba(37,211,102,0.15);color:#25D366;border:1px solid rgba(37,211,102,0.3);text-decoration:none;">📲 Notificar</a>' +
        '<button id="btnCerrarNotif" style="background:transparent;color:var(--gris-500);border:none;font-size:1.1rem;padding:0.2rem 0.4rem;">✕</button>';

      document.body.appendChild(notif);

      // Cerrar notificación
      document.getElementById('btnCerrarNotif').addEventListener('click', function () {
        notif.remove();
      });

      showToast('✅ Membresía activada correctamente');
    } else {
      // Rechazar pago
      var { error: updErr } = await sb
        .from('payments')
        .update({ status: 'failed', updated_at: new Date().toISOString() })
        .eq('id', paymentId);

      if (updErr) {
        showToast('Error al rechazar pago', true);
        return;
      }

      showToast('✕ Pago rechazado');
    }

    // Recargar dashboard
    await loadAdminDashboard();
  });

})();
  </script>
</body>
</html>
