<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Poder Jota</title>
  <meta name="description" content="Inicia sesión en Poder Jota para acceder a tus membresías y cursos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/animaciones.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dfsc2cv8f/image/upload/v1782189343/logop_ihqnik.png" />
  <!-- Phosphor Icons -->
  <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

  <!-- ============ NAVBAR ============ -->
  <header class="nav" id="navbar">
    <div class="nav__inner">
      <a href="index.html" class="brand" aria-label="Poder Jota, inicio">
        <img class="brand__logo" src="https://res.cloudinary.com/dfsc2cv8f/image/upload/v1782189343/logop_ihqnik.png" alt="Logo Poder Jota" width="42" height="42" />
        <span>Poder<b>Jota</b></span>
      </a>
      <nav class="nav__links" id="navLinks" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="fitness.html">Fitness</a>
        <a href="futbol.html">Fútbol</a>
        <a href="campus.html">Campus</a>
        <a href="precios.html">Precios</a>
        <a href="contacto.html" class="nav__cta--shine">Contacto</a>
      </nav>
      <button class="nav__toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ============ LOGIN FORM ============ -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-card__header">
        <a href="index.html" class="brand" style="justify-content:center;margin-bottom:var(--sp-2);">
          <img class="brand__logo" src="https://res.cloudinary.com/dfsc2cv8f/image/upload/v1782189343/logop_ihqnik.png" alt="Logo Poder Jota" width="42" height="42" />
          <span>Poder<b>Jota</b></span>
        </a>
        <h1 class="display h2">Ingresa</h1>
        <p class="lead" style="margin-top:var(--sp-1);">Accede a tus membresías y cursos</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email" />
          <span class="field__error"></span>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <span class="field__error"></span>
        </div>

        <div id="loginError" class="auth-error" style="display:none;"></div>

        <button type="submit" class="btn btn--primary auth-submit" id="btnLogin">
          Ingresar <span class="arrow">→</span>
        </button>
      </form>

      <div class="auth-divider">
        <span>O continúa con</span>
      </div>

      <button class="btn btn--ghost auth-google-btn" id="btnGoogleLogin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <p class="auth-footer-text">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { getSupabase, getSession } from './js/supabase.js';
    import { loginWithEmail, loginWithGoogle, initUserMenu } from './js/auth.js';

    // Redirigir si ya hay sesión
    (async () => {
      const session = await getSession();
      if (session) {
        window.location.href = 'perfil.html';
      }
    })();

    // Login con email
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('btnLogin');

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try {
        await loginWithEmail(email, password);
        // Obtener redirect de la URL
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect') || 'perfil.html';
        window.location.href = redirect;
      } catch (err) {
        errorEl.style.display = 'block';
        errorEl.textContent = err.message === 'Invalid login credentials'
          ? 'Correo o contraseña incorrectos.'
          : err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar →';
      }
    });

    // Login con Google
    document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
      try {
        await loginWithGoogle();
        // redirige automáticamente
      } catch (err) {
        const errorEl = document.getElementById('loginError');
        errorEl.style.display = 'block';
        errorEl.textContent = 'Error al conectar con Google. Intenta de nuevo.';
      }
    });

    // Inicializar navbar
    initUserMenu();

    // Año footer
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>
</body>
</html>
